name: Deploy Prod

on:
  workflow_run:
    workflows: [".NET Core"]
    types:
      - completed

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Prepare .env for deploy
        shell: bash
        run: |
          if [ -z "${{ secrets.TURNERO_ENV_FILE }}" ]; then
            echo "Missing required secret: TURNERO_ENV_FILE"
            exit 1
          fi
          printf '%s\n' "${{ secrets.TURNERO_ENV_FILE }}" > .env
          sed -i 's/\r$//' .env

      - name: Trust deployment host
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${{ secrets.PORT }}" "${{ secrets.SERVER }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy to production
        shell: pwsh
        run: |
          ./scripts/deploy-remote.ps1 `
            -RemoteHost "${{ secrets.SERVER }}" `
            -User "${{ secrets.USER_NAME }}" `
            -Version "${{ github.event.workflow_run.head_sha }}" `
            -RemotePath "${{ secrets.SRV_PATH }}" `
            -FirebaseCredentialsFile "${{ secrets.FIREBASE_PATH }}" `
            -SshPort ${{ secrets.PORT }} `
            -SyncEnv `
            -EnvFilePath ".env" `
            -BackupEnv `
            -BackupEnvRetention 20 `
            -UseTls

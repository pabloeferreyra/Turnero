version: "3.9"

services:
  turnero-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: turnero-app:prod
    container_name: turnero-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgresConnection: ${ConnectionStrings__PostgresConnection}
      Firebase__CredentialsPath: /run/secrets/firebase.json
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase.json
    ports:
      - "8080:8080"
    volumes:
      - ./.env:/app/.env:ro
      - ${FIREBASE_CREDENTIALS_FILE}:/run/secrets/firebase.json:ro
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/); [ \"$$code\" -ge 200 ] && [ \"$$code\" -lt 500 ]"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    cpus: "1.50"
    mem_limit: 1536m
    mem_reservation: 512m
